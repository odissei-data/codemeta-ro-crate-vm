# Specs: CPU: 2, RAM: 2G, Disk: 15G
- hosts: localhost
  become: true
  vars:
    infra_disk: 15GB
    infra_mem: 2GB
    infra_cpu: 2
  tasks:
  - name: Update system cache
    apt:
      update_cache: 'yes'
  - name: Install git
    package:
      name: git
      state: present
  - name: 'Ensure system software is installed: ruby'
    package:
      name: ruby
      state: present
    ignore_errors: true
  - name: Clone ODISSEI-code-library
    git:
      repo: https://github.com/odissei-data/ODISSEI-code-library
      dest: /home/ubuntu/ODISSEI-code-library
