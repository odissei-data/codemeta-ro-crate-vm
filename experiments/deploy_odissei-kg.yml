# Specs: CPU: 2, RAM: 4G, Disk: 15G
- hosts: localhost
  become: true
  vars:
    infra_disk: 15GB
    infra_mem: 4GB
    infra_cpu: 2
  tasks:
  - name: Update system cache
    apt:
      update_cache: 'yes'
  - name: Install git
    package:
      name: git
      state: present
  - name: 'Ensure system software is installed: nodejs'
    package:
      name: nodejs
      state: present
    ignore_errors: true
  - name: 'Ensure system software is installed: npm'
    package:
      name: npm
      state: present
    ignore_errors: true
  - name: 'Ensure system software is installed: typescript'
    package:
      name: typescript
      state: present
    ignore_errors: true
  - name: Clone odissei-kg
    git:
      repo: https://github.com/odissei-data/odissei-kg
      dest: /home/ubuntu/odissei-kg
